---  
# get release for Linux-armhf from mirror
- name: Download kiwix
  ansible.builtin.get_url:
    url: https://download.kiwix.org/release/kiwix-tools/{{ kiwix_version }}.tar.gz
    dest: /home/pi
    mode: '0440'

- name: Extract kiwixo
  ansible.builtin.unarchive:
    src: /home/pi/{{ kiwix_version }}.tar.gz
    dest: /home/pi
    remote_src: yes

# Make kiwix application folder
- name: Create  directory /var/kiwix/bin
  ansible.builtin.file:
    path: /var/kiwix/bin
    state: directory
    mode: '0755'

# Copy files we need from the toolset
- name: Copy some files to /var/kiwix/bin/
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /var/kiwix/bin/
    owner: pi
    group: pi
    mode: '0764'
    remote_src: yes
  loop:
    - /home/pi/{{ kiwix_version }}/kiwix-manage
    - /home/pi/{{ kiwix_version }}/kiwix-search
    - /home/pi/{{ kiwix_version }}/kiwix-serve

# Copy config files
- name: Copy file kiwix-start.pl
  ansible.builtin.copy:
    src: kiwix/kiwix-start.pl
    dest: /var/kiwix/bin/kiwix-start.pl
    owner: pi
    group: pi
    mode: '0755'

- name: Copy file kiwix-service
  ansible.builtin.copy:
    src: kiwix/kiwix-service
    dest: /etc/init.d/kiwix
    owner: root
    group: root
    mode: '0644'

- name: Copy file kiwix-service2
  ansible.builtin.copy:
    src: kiwix/kiwix.service
    dest: /etc/systemd/system/kiwix.service
    owner: root
    group: root
    mode: '0644'    


- name: Create kiwix data directory
  ansible.builtin.file:
    path: "{{ kiwix_data_directory }}"
    state: directory
    mode: "{{ kiwix_directory_mode }}"

# -----------------------------
# Vikidia - Get latest version
# -----------------------------

- name: Get Vikidia directory listing
  ansible.builtin.uri:
    url: https://ftp.nluug.nl/pub/kiwix/zim/vikidia/
    return_content: yes
  register: vikidia_index

- name: Extract latest Vikidia ZIM filename
  ansible.builtin.set_fact:
    vikidia_latest: >-
      {{ vikidia_index.content
         | regex_findall('href="(vikidia_[^"]+?\.zim)"')
         | sort
         | last }}

- name: Download latest Vikidia
  ansible.builtin.get_url:
    url: "https://ftp.nluug.nl/pub/kiwix/zim/vikidia/{{ vikidia_latest }}"
    dest: "{{ kiwix_data_directory }}/{{ vikidia_latest }}"
    mode: '0440'


# -----------------------------
# Wiktionary - Get latest version
# -----------------------------

- name: Get Wiktionary directory listing
  ansible.builtin.uri:
    url: https://ftp.nluug.nl/pub/kiwix/zim/wiktionary/
    return_content: yes
  register: wiktionary_index

- name: Extract latest Wiktionary ZIM filename
  ansible.builtin.set_fact:
    wiktionary_latest: >-
      {{ wiktionary_index.content
         | regex_findall('href="(wiktionary_[^"]+?\.zim)"')
         | sort
         | last }}

- name: Download latest Wiktionary
  ansible.builtin.get_url:
    url: "https://ftp.nluug.nl/pub/kiwix/zim/wiktionary/{{ wiktionary_latest }}"
    dest: "{{ kiwix_data_directory }}/{{ wiktionary_latest }}"
    mode: '0440'

- name: Get PhET directory listing
  ansible.builtin.uri:
    url: https://ftp.nluug.nl/pub/kiwix/zim/phet/
    return_content: yes
  register: phet_index


- name: Extract latest PhET ZIM filename
  ansible.builtin.set_fact:
    phet_latest: >-
      {{ phet_index.content
         | regex_findall('href="(phet_[^"]+?\.zim)"')
         | sort
         | last }}

# -----------------------------
# Wiktionary - Get latest PhET
# -----------------------------         

- name: Download latest PhET
  ansible.builtin.get_url:
    url: "https://ftp.nluug.nl/pub/kiwix/zim/phet/{{ phet_latest }}"
    dest: "{{ kiwix_data_directory }}/{{ phet_latest }}"
    mode: '0440'

# Create service
- name: create service kiwix
  ansible.builtin.systemd:
    state: started
    enabled: yes
    daemon_reload: yes
    name: kiwix    

# setup NGINX site
- name: Set wiki.local
  ansible.builtin.copy:
    src: "nginx/wiki.local"
    dest: /etc/nginx/sites-available/wiki.local
  notify:
    - Restart Nginx
    
# Enable site
- name: Create a symbolic link wiki.local
  ansible.builtin.file:
    src: /etc/nginx/sites-available/wiki.local
    dest: /etc/nginx/sites-enabled/wiki.local
    owner: pi
    group: pi
    state: link
  notify:
    - Restart Nginx
